<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ruleta</title>
<style>
  /* ============================================================
     IDENTIDAD VISUAL — oscuro/fiesta, móvil primero
     ============================================================ */
  :root{
    --bg:#0d0b14;
    --bg2:#16121f;
    --card:#1e1830;
    --card2:#271f3d;
    --ink:#f4f1fb;
    --muted:#a49cc0;
    --line:#332a4d;
    --accent:#ff2e88;      /* magenta fiesta */
    --accent2:#7b5cff;     /* violeta */
    --gold:#ffd15c;
    --ok:#3ddc97;
    --danger:#ff5b6e;
    --r:18px;
    --shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    width:100%;max-width:100%;
    overflow-x:hidden;
    overscroll-behavior-x:none;      /* evita el rebote lateral en iOS */
    position:relative;
  }
  body{
    background:
      radial-gradient(120% 80% at 20% -10%, rgba(123,92,255,.28), transparent 55%),
      radial-gradient(120% 80% at 90% 0%, rgba(255,46,136,.22), transparent 50%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .screen{
    display:none;
    min-height:100dvh;
    width:100%;max-width:560px;
    padding:22px 18px calc(22px + env(safe-area-inset-bottom));
    flex-direction:column;
    margin:0 auto;
  }
  .screen.active{display:flex;}

  h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px;}
  h1 .spark{color:var(--accent);}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;}

  /* ---- botones ---- */
  .btn{
    appearance:none;border:0;border-radius:var(--r);
    font-size:17px;font-weight:800;color:#fff;
    padding:17px 20px;width:100%;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 10px 24px rgba(255,46,136,.28);
    transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:scale(.97);filter:brightness(1.05);}
  .btn.ghost{background:var(--card2);box-shadow:none;color:var(--ink);border:1px solid var(--line);}
  .btn.small{padding:12px 14px;font-size:15px;width:auto;}
  .btn:disabled{opacity:.4;filter:grayscale(.4);}

  /* ---- setup: jugadores ---- */
  .players{display:flex;flex-direction:column;gap:10px;}
  .player-row{
    display:flex;align-items:center;gap:10px;
    background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:6px 6px 6px 14px;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  }
  .player-row.sel{border-color:var(--accent2);}
  .player-row .name{
    flex:1;color:var(--ink);font-size:16px;font-weight:600;
    padding:12px 0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .player-row input{
    flex:1;background:transparent;border:0;color:var(--ink);
    font-size:16px;font-weight:600;padding:12px 0;outline:none;min-width:0;
  }
  .player-row .del{
    background:transparent;border:0;color:var(--danger);font-size:22px;
    width:0;height:40px;border-radius:10px;cursor:pointer;flex:none;
    overflow:hidden;padding:0;opacity:0;transition:width .18s ease,opacity .18s ease;
  }
  .player-row.sel .del{width:40px;opacity:1;}
  .player-row .del:active{background:var(--card2);}
  .gender{display:flex;gap:4px;flex:none;}
  .gbtn{
    background:var(--card2);border:1px solid var(--line);border-radius:8px;
    color:var(--muted);font-size:13px;font-weight:800;width:30px;height:30px;
    cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;
  }
  .gbtn.sel-h{background:rgba(91,164,255,.2);border-color:#5ba4ff;color:#5ba4ff;}
  .gbtn.sel-m{background:rgba(255,46,136,.2);border-color:var(--accent);color:var(--accent);}
  .gbtn:active{transform:scale(.93);}
  .addrow-gender{display:flex;gap:4px;flex:none;align-items:center;}
  .addrow-gender .gbtn{width:36px;height:36px;font-size:14px;}
  .cupid-tag{
    font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--gold);
    border:1px solid rgba(255,209,92,.4);border-radius:999px;padding:2px 7px;flex:none;
  }
  .addrow{display:flex;gap:10px;margin-top:10px;}
  .addrow input{
    flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;
    color:var(--ink);font-size:16px;padding:14px;outline:none;
  }
  .addrow input:focus{border-color:var(--accent2);}

  /* ---- niveles ---- */
  .levels{display:flex;gap:10px;}
  .level{
    flex:1;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 8px;cursor:pointer;transition:.15s;
  }
  .level .emoji{font-size:24px;display:block;margin-bottom:4px;}
  .level .name{font-size:14px;font-weight:800;}
  .level.sel{border-color:var(--accent);background:linear-gradient(135deg,rgba(255,46,136,.18),rgba(123,92,255,.18));box-shadow:inset 0 0 0 1px var(--accent);}

  /* ---- modos ---- */
  .modes{display:flex;gap:10px;}
  .mode{
    flex:1;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:12px 6px;cursor:pointer;transition:.15s;
  }
  .mode .name{font-size:13px;font-weight:800;}
  .mode.sel{border-color:var(--accent2);background:linear-gradient(135deg,rgba(123,92,255,.2),rgba(255,46,136,.12));box-shadow:inset 0 0 0 1px var(--accent2);}

  .spacer{flex:1;}
  .foot{margin-top:16px;}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin-top:10px;}

  /* ============================================================
     JUEGO
     ============================================================ */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .topbar .lvlpill{font-size:12px;font-weight:800;color:var(--gold);background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:999px;}
  .topbar .back{background:transparent;border:0;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;}

  /* ---- ruleta ---- */
  .wheel-wrap{position:relative;width:min(84vw,340px);aspect-ratio:1;margin:14px auto 6px;}
  .pointer{
    position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:5;
    width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;
    border-top:26px solid var(--gold);filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));
  }
  .wheel{
    width:100%;height:100%;border-radius:50%;
    box-shadow:0 0 0 8px var(--bg2),0 0 0 10px var(--line),var(--shadow);
    transition:transform 4.6s cubic-bezier(.17,.67,.16,1);
  }
  .hub{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:64px;height:64px;border-radius:50%;z-index:4;
    background:radial-gradient(circle at 35% 30%,#fff,#d9d0f0 40%,#8a7fb8);
    box-shadow:0 6px 14px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
  }

  .stage{flex:1;display:flex;flex-direction:column;justify-content:flex-start;}

  /* ---- carta ---- */
  .card{
    background:linear-gradient(160deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:24px;
    padding:26px 22px;margin-top:18px;box-shadow:var(--shadow);
    opacity:0;transform:translateY(16px) scale(.98);
    transition:opacity .35s ease, transform .35s ease;
  }
  .card.show{opacity:1;transform:none;}
  .card .cat{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .card .who{
    display:inline-block;font-size:15px;font-weight:800;color:#0d0b14;
    background:var(--gold);padding:6px 14px;border-radius:999px;margin-bottom:16px;
  }
  .card .phrase{font-size:23px;line-height:1.35;font-weight:700;}
  .card .penalty{
    margin-top:16px;font-size:14px;font-weight:700;color:var(--muted);
    border-top:1px solid var(--line);padding-top:12px;
  }
  .card .penalty b{color:var(--gold);}

  /* Banner de regla activa (persistente) */
  .rulebar{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,209,92,.12);border:1px solid rgba(255,209,92,.4);
    border-radius:12px;padding:10px 14px;margin-bottom:12px;
    font-size:13px;font-weight:700;color:var(--gold);
  }
  .rulebar .rounds{margin-left:auto;font-size:11px;opacity:.85;white-space:nowrap;}

  /* Carta de evento: se distingue de las normales */
  .card.evento{
    background:linear-gradient(160deg,#2a1f3d,#1d1630);
    border-color:var(--accent2);
    box-shadow:0 0 0 1px var(--accent2),var(--shadow);
  }
  .card.evento .cat{color:var(--accent2);}
  .card .evento-box{
    margin-top:16px;padding:14px;border-radius:14px;
    background:linear-gradient(135deg,rgba(123,92,255,.22),rgba(255,46,136,.14));
    border:1px solid var(--accent2);
  }
  .card .evento-box .ev-tit{
    font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--accent2);margin-bottom:6px;
  }
  .card .evento-box .ev-txt{font-size:16px;font-weight:700;line-height:1.35;color:var(--ink);}

  .turnbtn{margin-top:auto;}
  .turnrow{margin-top:auto;display:flex;gap:10px;align-items:stretch;}
  .turnrow .turnbtn{margin-top:0;flex:1;}
  .btn.skip{
    flex:none;width:auto;background:var(--card2);box-shadow:none;
    color:var(--muted);border:1px solid var(--line);
  }

  /* ============================================================
     MODO CUPIDO (long-press) — overlay
     ============================================================ */
  .overlay{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:flex-end;justify-content:center;
    background:rgba(6,4,12,.72);backdrop-filter:blur(4px);
  }
  .overlay.active{display:flex;}
  .sheet{
    width:100%;max-width:560px;background:var(--bg2);
    border-top-left-radius:26px;border-top-right-radius:26px;
    border-top:1px solid var(--line);
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -20px 50px rgba(0,0,0,.5);
    animation:slideup .28s ease;
  }
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .sheet h2{margin:0 0 2px;font-size:20px;font-weight:800;}
  .sheet .cupid-sub{color:var(--muted);font-size:13px;margin:0 0 16px;}
  .pair-grid{display:flex;flex-direction:column;gap:8px;max-height:38vh;overflow:auto;}
  .pair{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;
  }
  .pair .names{font-size:15px;font-weight:700;}
  .pair .names small{color:var(--muted);font-weight:600;}
  .pair .rm{background:transparent;border:0;color:var(--danger);font-size:14px;font-weight:800;cursor:pointer;}
  .selectors{display:flex;gap:8px;margin-top:12px;}
  .selectors select{
    flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-size:15px;padding:12px;outline:none;
  }
  .sheet-actions{display:flex;gap:10px;margin-top:14px;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px 0;}

  .toast{
    position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--card2);border:1px solid var(--line);color:var(--ink);
    padding:12px 18px;border-radius:999px;font-size:14px;font-weight:700;
    z-index:80;opacity:0;pointer-events:none;transition:opacity .25s;
    max-width:calc(100vw - 40px);text-align:center;
  }
  .toast.show{opacity:1;}

  /* Engranaje de ajustes */
  .setup-top{display:flex;justify-content:flex-start;margin-bottom:2px;}
  .gear{
    background:transparent;border:0;font-size:24px;cursor:pointer;
    padding:4px;line-height:1;opacity:.85;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  }
  .gear:active{transform:scale(.92);}

  /* Filas de ajuste con interruptor */
  .setting-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 4px;font-size:16px;font-weight:700;
    border-bottom:1px solid var(--line);
  }
  .toggle{
    width:52px;height:30px;border-radius:999px;border:0;cursor:pointer;
    background:var(--card2);border:1px solid var(--line);position:relative;
    transition:background .18s;
  }
  .toggle .knob{
    position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:var(--muted);transition:left .18s,background .18s;
  }
  .toggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
  .toggle.on .knob{left:25px;background:#fff;}

  /* Overlay de evento a pantalla completa */
  .ev-overlay{
    position:fixed;inset:0;z-index:70;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,rgba(123,92,255,.35),rgba(6,4,12,.94));
    backdrop-filter:blur(3px);padding:24px;
  }
  .ev-overlay.active{display:flex;animation:evpop .3s ease;}
  @keyframes evpop{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:none;}}
  .ev-overlay .confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .ev-content{position:relative;text-align:center;max-width:440px;}
  .ev-big-tit{
    font-size:16px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
    color:var(--gold);margin-bottom:18px;
  }
  .ev-big-txt{font-size:28px;line-height:1.3;font-weight:800;color:var(--ink);}
  .ev-close{
    position:relative;margin-top:36px;max-width:440px;width:100%;
  }
</style>
</head>
<body>

<!-- ===================== SETUP ===================== -->
<section id="setup" class="screen active">
  <div class="setup-top">
    <button class="gear" id="gearBtn" aria-label="Ajustes">⚙️</button>
  </div>
  <h1>Ruleta<span class="spark">.</span></h1>
  <p class="sub">Jugadores, nivel, y a girar.</p>

  <div class="label">Jugadores</div>
  <div id="players" class="players"></div>
  <div class="addrow">
    <input id="newName" type="text" placeholder="Nombre nuevo" maxlength="18" autocomplete="off">
    <div class="addrow-gender">
      <button class="gbtn" id="gH" data-g="H">H</button>
      <button class="gbtn" id="gM" data-g="M">M</button>
    </div>
    <button class="btn small" id="addBtn">Añadir</button>
  </div>

  <div class="label">Nivel</div>
  <div class="levels" id="levels">
    <div class="level" data-lvl="suave"><span class="emoji">😇</span><span class="name">Suave</span></div>
    <div class="level" data-lvl="picante"><span class="emoji">🌶️</span><span class="name">Picante</span></div>
    <div class="level" data-lvl="bestia"><span class="emoji">🔥</span><span class="name">Bestia</span></div>
  </div>

  <div class="label">Modo</div>
  <div class="modes" id="modes">
    <div class="mode" data-modo="normal"><span class="name">Completo</span></div>
    <div class="mode" data-modo="preguntas"><span class="name">Preguntas</span></div>
    <div class="mode" data-modo="parejas"><span class="name">Parejas</span></div>
  </div>

  <div class="spacer"></div>
  <div class="foot">
    <button class="btn" id="startBtn">Empezar</button>
  </div>
</section>

<!-- ===================== JUEGO ===================== -->
<section id="game" class="screen">
  <div class="topbar">
    <button class="back" id="backBtn">‹ Ajustes</button>
    <span class="lvlpill" id="lvlPill">🌶️ Picante</span>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas class="wheel" id="wheel" width="680" height="680"></canvas>
    <div class="hub" id="hub">🎯</div>
  </div>

  <div class="stage">
    <div class="rulebar" id="ruleBar" style="display:none"></div>
    <div class="card" id="card">
      <div class="cat" id="cardCat">—</div>
      <div class="who" id="cardWho" style="display:none"></div>
      <div class="phrase" id="cardPhrase">Dale al centro para girar.</div>
      <div class="penalty" id="cardPenalty" style="display:none"></div>
      <div class="evento-box" id="cardEvento" style="display:none"></div>
    </div>
    <div class="turnrow">
      <button class="btn skip" id="skipBtn" style="display:none">Saltar</button>
      <button class="btn turnbtn" id="turnBtn">Girar</button>
    </div>
  </div>
</section>

<!-- ===================== CUPIDO SHEET ===================== -->
<div class="overlay" id="cupidOverlay">
  <div class="sheet">
    <h2>💘 Modo cupido</h2>
    <p class="cupid-sub">Las parejas de aquí recibirán más turnos con acción. Nadie más lo verá.</p>
    <div class="pair-grid" id="pairGrid"></div>
    <div class="selectors">
      <select id="selA"></select>
      <select id="selB"></select>
    </div>
    <div class="sheet-actions">
      <button class="btn small ghost" id="cupidClose" style="flex:1">Cerrar</button>
      <button class="btn small" id="pairAdd" style="flex:1">Juntar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ===================== AJUSTES ===================== -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>⚙️ Ajustes</h2>
    <div class="setting-row">
      <span>Vibración</span>
      <button class="toggle" id="tglVibra" aria-label="Vibración"><span class="knob"></span></button>
    </div>
    <div class="setting-row">
      <span>Sonido</span>
      <button class="toggle" id="tglSonido" aria-label="Sonido"><span class="knob"></span></button>
    </div>
    <div class="sheet-actions">
      <button class="btn small ghost" id="settingsClose" style="flex:1">Cerrar</button>
    </div>
  </div>
</div>

<!-- ===================== EVENTO (pantalla completa) ===================== -->
<div class="ev-overlay" id="evOverlay">
  <canvas class="confetti" id="confetti"></canvas>
  <div class="ev-content">
    <div class="ev-big-tit">¡Evento!</div>
    <div class="ev-big-txt" id="evBigTxt"></div>
  </div>
  <button class="btn ev-close" id="evClose">Cerrar</button>
</div>

<script>
"use strict";

/* ============================================================
   BANCO DE FRASES
   Estructura fija. La lógica NO asume cuántas frases hay.
   Categorías (5):
     del_1_al   -> "Del 1 al..."         puntuar algo del 1 al 10
     verdad     -> "Verdad"              pregunta personal
     reto       -> "Reto"                acción, puede incluir a otro
     quien_es_mas -> "Quién es más probable"  señalar a alguien
     con_quien  -> "Con quién de aquí"   emparejar con otro

   Placeholders que la lógica sustituye por nombres:
     {jugador}  -> jugador al que le toca el turno
     {otro}     -> otro jugador distinto (para reto/con_quien)

   >>> AÑADIR MÁS FRASES: pega dentro de cada lista, una por línea,
   entre comillas y separadas por coma. No toques nada más.
   ============================================================ */
const BANCO = {

  suave: {
    del_1_al: [
      "¿Os dais un abrazo?",
      "¿Os hacéis un cumplido sincero?",
      "¿Mantenéis la mirada durante cinco segundos?",
      "¿Os hacéis una foto juntos?",
      "¿Bailáis juntos durante diez segundos?",
      "¿Os contáis vuestra primera impresión?",
      "¿Os sentáis juntos durante una ronda?",
      "¿Inventáis un saludo secreto?",
      "¿Os chocáis la mano de una forma original?",
      "¿Os dedicáis una canción?",
      "¿Os decís algo que tenéis en común?",
      "¿Compartís una anécdota divertida?",
      "¿Os hacéis una pregunta para conoceros mejor?",
      "¿Intercambiáis un accesorio durante una ronda?",
      "¿Imitáis una escena de primera cita?",
      "¿Hacéis una pose de pareja de película?",
      "¿Elegís una canción para escuchar juntos?",
      "¿Os decís qué energía os transmite el otro?",
      "¿Inventáis un apodo inocente para el otro?",
      "¿Brindáis juntos?",
      "¿Os dais un abrazo de cinco segundos?",
      "¿Os susurráis un cumplido al oído?",
      "¿Os cogéis de la mano durante diez segundos?",
      "¿Hacéis un mini baile juntos?",
      "¿Os contáis un secreto inocente?",
      "¿Os miráis sin reíros durante diez segundos?",
      "¿Elegís el próximo reto del otro?",
      "¿Os decís qué plan haríais juntos?",
      "¿Os hacéis una foto como si fuerais una pareja famosa?",
      "¿Compartís vuestro emoji más usado?",
      "¿Os sentáis hombro con hombro durante una ronda?",
      "¿Os contáis qué fue lo primero que os llamó la atención?",
      "¿Hacéis una promesa divertida para esta noche?",

function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ /* Safari privado puede fallar: seguimos en memoria */ }
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(Array.isArray(d.players) && d.players.length) state.players = d.players;
    if(d.genders && typeof d.genders==="object") state.genders = d.genders;
    if(d.level && BANCO[d.level]) state.level = d.level;
    if(Array.isArray(d.pairs)) state.pairs = d.pairs;
    if(d.usedCards && typeof d.usedCards==="object") state.usedCards = d.usedCards;
    if(typeof d.cupidTurn==="number") state.cupidTurn = d.cupidTurn;
    if(Array.isArray(d.cycle)) state.cycle = d.cycle;
    if(d.reglaActiva && typeof d.reglaActiva==="object") state.reglaActiva = d.reglaActiva;
    if(typeof d.vibra==="boolean") state.vibra = d.vibra;
    if(typeof d.sonido==="boolean") state.sonido = d.sonido;
    if(d.modo && ["normal","preguntas","parejas"].includes(d.modo)) state.modo = d.modo;
  }catch(e){ /* datos corruptos: arrancamos limpios */ }
}

const $ = s => document.querySelector(s);
const rand = n => Math.floor(Math.random()*n);
function pick(arr){ return arr[rand(arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=rand(i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pickWeighted(items){
  const total = items.reduce((s,i)=>s+i.weight,0);
  let r = Math.random()*total;
  for(const it of items){ if((r-=it.weight)<0) return it; }
  return items[items.length-1];
}
function showToast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._id); t._id=setTimeout(()=>t.classList.remove("show"),1600);
}

// Web Audio: se genera el tono por código. Se crea al primer toque
// (Safari iOS exige gesto del usuario para arrancar el audio).
let audioCtx=null;
function initAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ audioCtx=null; }
  }
  if(audioCtx && audioCtx.state==="suspended") audioCtx.resume();
}
function beep(freq, dur, type, vol){
  if(!state.sonido || !audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.value=vol||0.06;
  o.connect(g); g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  o.start(t);
  g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
  o.stop(t+(dur||0.12));
}
// Tic-tic de la ruleta girando: una serie de clics que se van espaciando.
function sonidoRuleta(){
  if(!state.sonido || !audioCtx) return;
  let delay=0, gap=60;
  for(let i=0;i<28;i++){
    setTimeout(()=>beep(1200,0.03,"square",0.03), delay);
    delay+=gap; gap*=1.12;   // desacelera como la rueda
  }
}

function sonidoEvento(){ beep(523,0.12,"sine",0.08); setTimeout(()=>beep(784,0.14,"sine",0.08),110); setTimeout(()=>beep(1046,0.18,"sine",0.08),230); }

/* ============================================================
   CONFETI (canvas, sin librerías)
   ============================================================ */
function lanzarConfeti(){
  const cv=$("#confetti"); if(!cv) return;
  const ctx=cv.getContext("2d");
  const W=cv.width=cv.offsetWidth, H=cv.height=cv.offsetHeight;
  const cols=["#ff2e88","#7b5cff","#ffd15c","#3ddc97","#ff8a3d","#f6f6f6"];
  const N=120, parts=[];
  for(let i=0;i<N;i++){
    parts.push({
      x:Math.random()*W, y:-20-Math.random()*H*0.5,
      vx:(Math.random()-0.5)*3, vy:2+Math.random()*4,
      s:5+Math.random()*7, rot:Math.random()*6.28,
      vr:(Math.random()-0.5)*0.3, c:pick(cols),
    });
  }
  let frames=0;
  function tick(){
    ctx.clearRect(0,0,W,H);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
      ctx.restore();
    });
    frames++;
    if(frames<150) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,W,H);
  }
  tick();
}

  return state.cupidTurn >= rondas;
}

// Devuelve un índice de frase no usado para una lista dada, respetando
// no-repetición y el filtro de puente. trackId identifia el contador.
function nextIndexFrom(list, trackId){
  if(!list || !list.length) return -1;
  // Índices candidatos: si el puente no está desbloqueado, excluye las puente.
  const permitido = [];
  for(let i=0;i<list.length;i++){
    if(esPuente(list[i]) && !puenteDesbloqueado()) continue;
    permitido.push(i);
  }
  if(!permitido.length) return -1;
  let used = state.usedCards[trackId] || [];
  // Solo cuentan como "usados" los que siguen permitidos.
  used = used.filter(i=>permitido.includes(i));
  if(used.length >= permitido.length){ used = []; }   // agotado -> rebaraja
  const free = permitido.filter(i=>!used.includes(i));
  const chosen = pick(free);
  used.push(chosen);
  state.usedCards[trackId] = used;
  return chosen;
}

function nextCardIndex(level, catKey){
  return nextIndexFrom(BANCO[level][catKey], level+"|"+catKey);
}

// Devuelve los jugadores que pueden ser {otro} dado el protagonista.
// Regla: H+H nunca; H+M y M+M sí. Si género no definido, sin restricción.
function validPartners(jugador){
  const gJ = state.genders[jugador];
  return state.players.filter(p=>{
    if(p===jugador) return false;
    if(!gJ) return true;               // protagonista sin género -> cualquiera
    const gP = state.genders[p];
    if(!gP) return true;               // pareja sin género -> permitida
    if(gJ==="H" && gP==="H") return false; // H+H prohibido
    return true;
  });
}
/* ============================================================
   ASIGNACIÓN DE JUGADORES (ciclo barajado + sesgo cupido)
   Reglas:
   - El PROTAGONISTA ({jugador}) sale por ciclos: cada jugador aparece
     una vez por ciclo; al vaciarse el ciclo se rebaraja con orden nuevo.
   - Cupido (slots 0 y 3 de cada 5) fuerza que el protagonista sea de la
     pareja, y ESE turno consume su aparición del ciclo (opción a).
   - {otro} (segunda persona en cartas interactivas) se elige al azar
     entre el resto y NO entra en el ciclo.
   ============================================================ */

// Saca el siguiente protagonista del ciclo. Si el ciclo está vacío,
// lo rellena barajando a todos los jugadores.
function refillCycleIfNeeded(){
  // Purga nombres que ya no existen (jugadores borrados).
  state.cycle = state.cycle.filter(n=>state.players.includes(n));
  if(state.cycle.length===0){
    state.cycle = shuffle(state.players);
  }
}

// Si el jugador pertenece a una pareja cupido, devuelve su compañero; si no, null.
function cupidPartnerOf(jugador){
  for(const p of state.pairs){
    if(p.a===jugador) return p.b;
    if(p.b===jugador) return p.a;
  }
  return null;
}

function assignPlayers(cat){
  let jugador, otro=null;

  refillCycleIfNeeded();
  // Protagonista SIEMPRE del ciclo normal: nadie sale de más, patrón invisible.
  jugador = state.cycle.shift();
  refillCycleIfNeeded();

  if(cat.interactive){
    const partners = validPartners(jugador);
    // Sesgo cupido: si el protagonista tiene compañero y es pareja válida,
    // 65% de las veces el "otro" es ese compañero; el resto, aleatorio.
    const partner = cupidPartnerOf(jugador);
    if(partner && partners.includes(partner) && Math.random()<0.65){
      otro = partner;
    } else {
      otro = partners.length ? pick(partners) : null;
    }
  }
  return { jugador, otro };
}

/* Categoría por ruleta ponderada. Sin forzados: el cupido ya no toca aquí. */
function chooseCategory(){
  if(state.modo==="preguntas"){
    return pickWeighted(CATS.filter(c=>["quien_es_mas","verdad","con_quien","yo_nunca"].includes(c.key)));
  }
  if(state.modo==="parejas"){
    return pickWeighted(CATS.filter(c=>["reto","del_1_al"].includes(c.key)));
  }
  // Completo: en bestia, yo_nunca tiene doble peso para ser más recurrente.
  if(state.level==="bestia"){
    const cats = CATS.map(c=>c.key==="yo_nunca" ? {...c, weight:c.weight*2} : c);
    return pickWeighted(cats);
  }
  return pickWeighted(CATS);
}

/* ============================================================
   RENDER SETUP
   ============================================================ */
function renderPlayers(){
  const box = $("#players");
  box.innerHTML = "";
  state.players.forEach((name, i)=>{
    const row = document.createElement("div");
    row.className = "player-row";

    // Nombre como texto (no input) para no robar el toque al long-press.
    const nameEl = document.createElement("div");
    nameEl.className = "name";
    nameEl.textContent = name;

    // Papelera (oculta hasta seleccionar la fila con un tap).
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "🗑";
    del.addEventListener("click",(e)=>{
      e.stopPropagation();
      if(state.players.length<=2){ showToast("Mínimo 2 jugadores"); return; }
      const removed = state.players.splice(i,1)[0];
      delete state.genders[removed];
      state.pairs = state.pairs.filter(p=>p.a!==removed&&p.b!==removed);
      save(); renderPlayers();
    });

    // Pasa el nombre a modo edición (input temporal).
    function editName(){
      const input = document.createElement("input");
      input.type="text"; input.value=state.players[i]; input.maxLength=18;
      row.replaceChild(input, nameEl);
      input.focus(); input.select();
      const commit = ()=>{
        const old = state.players[i];
        const val = input.value.trim() || old;
        state.players[i]=val;
        // mantener género y parejas coherentes al renombrar
        if(old!==val){
          state.genders[val]=state.genders[old];
          delete state.genders[old];
          state.pairs.forEach(p=>{ if(p.a===old)p.a=val; if(p.b===old)p.b=val; });
        }
        save(); renderPlayers();
      };
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", e=>{ if(e.key==="Enter") input.blur(); });
    }

    // Interacción: tap = seleccionar; segundo tap sobre fila ya seleccionada = editar.
    // (El modo cupido ahora se abre desde el engranaje, no aquí.)
    attachRowGestures(row, {
      onTap: ()=>{
        if(row.classList.contains("sel")){ editName(); }
        else { selectRow(row); }
      },
    });

    // Botones género H/M
    const gBox = document.createElement("div");
    gBox.className="gender";
    ["H","M"].forEach(g=>{
      const gb=document.createElement("button");
      gb.className="gbtn"; gb.textContent=g;
      const cur=state.genders[name];
      if(cur===g) gb.classList.add(g==="H"?"sel-h":"sel-m");
      gb.addEventListener("click",e=>{
        e.stopPropagation();
        const cur=state.genders[state.players[i]];
        state.genders[state.players[i]] = (cur===g) ? null : g;
        save(); renderPlayers();
      });
      gBox.appendChild(gb);
    });

    row.appendChild(nameEl);
    row.appendChild(gBox);
    row.appendChild(del);
    box.appendChild(row);
  });
}

function selectRow(row){
  document.querySelectorAll(".player-row.sel").forEach(r=>{ if(r!==row) r.classList.remove("sel"); });
  row.classList.add("sel");
}

/* Gestos por fila: distingue tap corto de long-press (700ms),
   cancela si el dedo se mueve. El long-press NO dispara tap. */
function attachRowGestures(el, {onTap, onLong}){
  let timer=null, longFired=false, startX=0, startY=0, moved=false;
  const LONG_MS = 2000;

  const start=(x,y)=>{
    startX=x; startY=y; moved=false; longFired=false;
    timer=setTimeout(()=>{ longFired=true; timer=null; onLong&&onLong(); }, LONG_MS);
  };
  const move=(x,y)=>{
    if(Math.abs(x-startX)>12||Math.abs(y-startY)>12){
      moved=true;
      if(timer){ clearTimeout(timer); timer=null; }
    }
  };
  const end=()=>{
    if(timer){ clearTimeout(timer); timer=null; }
    if(!longFired && !moved){ onTap&&onTap(); }
  };

  el.addEventListener("touchstart",e=>{ const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
  el.addEventListener("touchmove", e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:true});
  el.addEventListener("touchend", e=>{ end(); });
  el.addEventListener("touchcancel", ()=>{ if(timer){clearTimeout(timer);timer=null;} });
  // fallback ratón para pruebas en desktop
  let mdown=false;
  el.addEventListener("mousedown",e=>{ mdown=true; start(e.clientX,e.clientY); });
  el.addEventListener("mousemove",e=>{ if(mdown) move(e.clientX,e.clientY); });
  el.addEventListener("mouseup",  ()=>{ if(mdown){ mdown=false; end(); } });
  el.addEventListener("mouseleave",()=>{ if(mdown){ mdown=false; if(timer){clearTimeout(timer);timer=null;} } });
}

function renderLevels(){
  document.querySelectorAll(".level").forEach(el=>{
    el.classList.toggle("sel", el.dataset.lvl===state.level);
  });
  document.querySelectorAll(".mode").forEach(el=>{
    el.classList.toggle("sel", el.dataset.modo===state.modo);
  });
}

function escHtml(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s){ return String(s).replace(/"/g,"&quot;"); }

/* ============================================================
   RULETA (canvas)
   ============================================================ */
const canvas=$("#wheel"), ctx=canvas.getContext("2d");
const SIZE=canvas.width, CX=SIZE/2, CY=SIZE/2, R=SIZE/2-6;
let currentRotation=0, spinning=false;

// Sectores iguales en la rueda (visual). El resultado real es ponderado:
// giramos hasta el sector de la categoría elegida por chooseCategory().
// Categorías visibles en la ruleta según el modo activo.
function catsActivas(){
  if(state.modo==="preguntas"){
    return CATS.filter(c=>["quien_es_mas","verdad","con_quien","yo_nunca"].includes(c.key));
  }
  if(state.modo==="parejas"){
    return CATS.filter(c=>["reto","del_1_al"].includes(c.key));
  }
  return CATS;
}

function drawWheel(){
  const cats=catsActivas();
  const n=cats.length, seg=(Math.PI*2)/n;
  ctx.clearRect(0,0,SIZE,SIZE);
  for(let i=0;i<n;i++){
    const a0=i*seg - Math.PI/2, a1=a0+seg;
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1);
    ctx.closePath();
    ctx.fillStyle=cats[i].color;
    ctx.fill();
    // texto
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(a0+seg/2);
    ctx.textAlign="right";
    ctx.fillStyle="rgba(0,0,0,.82)";
    ctx.font="700 30px -apple-system,system-ui,sans-serif";
    wrapLabel(cats[i].label, R-24);
    ctx.restore();
  }
}
function wrapLabel(text,x){
  const words=text.split(" ");
  if(words.length<=1){ ctx.fillText(text,x,10); return; }
  const mid=Math.ceil(words.length/2);
  ctx.fillText(words.slice(0,mid).join(" "),x,-6);
  ctx.fillText(words.slice(mid).join(" "),x,26);
}

function categoryAngle(index, total){
  const seg=360/total;
  // centro del sector, corregido para que quede bajo el puntero (arriba)
  return -(index*seg + seg/2);
}

function spin(){
  if(spinning) return;
  spinning=true;
  $("#turnBtn").disabled=true;
  $("#skipBtn").style.display="none";
  $("#card").classList.remove("show");
  initAudio();
  sonidoRuleta();

  const cat = chooseCategory();
  const cats = catsActivas();
  const catIndex = cats.findIndex(c=>c.key===cat.key);

  const extraTurns = 5 + rand(3);            // 5-7 vueltas
  const target = categoryAngle(catIndex, cats.length);
  const base = currentRotation - (currentRotation % 360);
  currentRotation = base + extraTurns*360 + target;
  canvas.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(()=>{ revealCard(cat); }, 4700);
}

/* Muestra/oculta el banner de regla activa y descuenta una tirada.
   Se llama una vez por tirada. Cuando quedan llega a 0, la regla expira. */
function actualizarBannerRegla(){
  const bar=$("#ruleBar");
  const r=state.reglaActiva;
  if(!r){ bar.style.display="none"; return; }
  bar.style.display="flex";
  const t = r.quedan===1 ? "1 tirada" : r.quedan+" tiradas";
  bar.innerHTML = `<span>📜 ${escHtml(r.texto)}</span><span class="rounds">${t}</span>`;
  r.quedan--;
  if(r.quedan<=0){ state.reglaActiva=null; }
}

function revealCard(cat){
  // Feedback al parar la ruleta
  vibrar(60);
  sonidoParada();

  const { jugador, otro } = cat.soloGrupo ? { jugador: null, otro: null } : assignPlayers(cat);

  // ¿Es una carta cupido? Solo en del_1_al, cuando protagonista y "otro"
  // son justo una pareja cupido. Entonces la frase sale del banco especial.
  let phrase;
  const partner = jugador ? cupidPartnerOf(jugador) : null;
  const esCartaCupido = (cat.key==="del_1_al" && otro && otro===partner);

  if(esCartaCupido){
    const lista = BANCO_CUPIDO[state.level] || [];
    const idx = nextIndexFrom(lista, "CUPIDO|"+state.level);
    phrase = (idx>=0) ? fraseTexto(lista[idx]) : "(sin frases cupido)";
  } else {
    const idx = nextCardIndex(state.level, cat.key);
    const list = BANCO[state.level][cat.key];
    phrase = (idx>=0 && list[idx]) ? fraseTexto(list[idx]) : "(sin frases en esta categoría — añade en el BANCO)";
  }

  phrase = phrase.replaceAll("{jugador}", jugador).replaceAll("{otro}", otro||jugador);

  const whoEl=$("#cardWho");
  if(cat.soloGrupo || !jugador){
    whoEl.style.display="none";
    whoEl.textContent="";
  } else if(cat.interactive && otro && otro!==jugador){
    whoEl.style.display="inline-block";
    whoEl.textContent = `${jugador} + ${otro}`;
  } else {
    whoEl.style.display="inline-block";
    whoEl.textContent = jugador;
  }
  $("#cardCat").textContent = cat.label;
  $("#cardPhrase").textContent = phrase;

  // Penalización: si la categoría es bebible, muestra los tragos del nivel.
  const penEl=$("#cardPenalty");
  if(cat.bebible){
    const n = TRAGOS[state.level] || 1;
    penEl.style.display="block";
    penEl.innerHTML = `¿No te atreves? Bebe <b>${n} trago${n>1?"s":""}</b>.`;
  } else {
    penEl.style.display="none";
  }

  // --- Regla persistente activa: mostrar banner y descontar ---
  actualizarBannerRegla();

  // --- Lotería de evento: 20% independiente cada tirada ---
  const evEl=$("#cardEvento");
  evEl.style.display="none";  // ya no se muestra dentro de la carta
  if(Math.random() < PROB_EVENTO){
    const ev = pick(EVENTOS);
    if(ev.tipo==="regla"){
      // Activa la regla durante una ronda = nº de jugadores.
      // Empieza a contar desde la SIGUIENTE tirada.
      state.reglaActiva = { texto: ev.texto, quedan: state.players.length };
      const bar=$("#ruleBar");
      bar.style.display="flex";
      const q=state.reglaActiva.quedan;
      bar.innerHTML = `<span>📜 ${escHtml(ev.texto)}</span><span class="rounds">${q} tiradas</span>`;
    }
    // Muestra el evento a pantalla completa con confeti (tras un pelín de margen)
    setTimeout(()=>mostrarEvento(ev.texto), 400);
  }

  $("#card").classList.add("show");

  state.cupidTurn++;
  save();

  spinning=false;
  $("#turnBtn").disabled=false;
  $("#turnBtn").textContent="Siguiente turno";
  $("#skipBtn").style.display="block";
}

/* Muestra el evento a pantalla completa con confeti, vibración y sonido. */
function mostrarEvento(texto){
  $("#evBigTxt").textContent = texto;
  $("#evOverlay").classList.add("active");
  vibrar([0,90,60,90]);   // patrón distinto para que se note que es evento
  sonidoEvento();
  lanzarConfeti();
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  load();
  renderPlayers();
  renderLevels();
  drawWheel();

  // Género seleccionado en el addrow (variable local compartida)
  let newGender = null;
  function updateGenderBtns(){
    ["H","M"].forEach(g=>{
      const btn=$("#g"+g);
      btn.classList.remove("sel-h","sel-m");
      if(newGender===g) btn.classList.add(g==="H"?"sel-h":"sel-m");
    });
  }
  $("#gH").addEventListener("click",()=>{ newGender=(newGender==="H")?null:"H"; updateGenderBtns(); });
  $("#gM").addEventListener("click",()=>{ newGender=(newGender==="M")?null:"M"; updateGenderBtns(); });

  $("#addBtn").addEventListener("click",()=>{
    const inp=$("#newName"); const v=inp.value.trim();
    if(!v) return;
    state.players.push(v);
    state.genders[v] = newGender;
    inp.value=""; newGender=null; updateGenderBtns();
    state.cycle=[]; save(); renderPlayers();
  });
  $("#newName").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#addBtn").click(); });

  document.querySelectorAll(".level").forEach(el=>{
    el.addEventListener("click",()=>{ state.level=el.dataset.lvl; save(); renderLevels(); });
  });
  document.querySelectorAll(".mode").forEach(el=>{
    el.addEventListener("click",()=>{ state.modo=el.dataset.modo; save(); renderLevels(); });
  });

  $("#startBtn").addEventListener("click",goGame);
  $("#backBtn").addEventListener("click",goSetup);
  $("#turnBtn").addEventListener("click",spin);
  $("#hub").addEventListener("click",spin);
  $("#skipBtn").addEventListener("click",()=>{
    // Saltar: descarta la carta actual sin hacerla. La regla/evento ya
    // se aplicaron en esta tirada, así que solo ocultamos y dejamos girar.
    $("#card").classList.remove("show");
    $("#skipBtn").style.display="none";
    $("#turnBtn").textContent="Girar";
  });

  $("#cupidClose").addEventListener("click",closeCupid);
  $("#pairAdd").addEventListener("click",addPair);
  $("#cupidOverlay").addEventListener("click",e=>{ if(e.target.id==="cupidOverlay") closeCupid(); });

  // --- Ajustes ---
  function syncToggles(){
    $("#tglVibra").classList.toggle("on", state.vibra);
    $("#tglSonido").classList.toggle("on", state.sonido);
  }
  syncToggles();
  // Engranaje: 1 toque = ajustes; 5 toques rápidos (<2s) = modo cupido.
  let gearTaps=0, gearTimer=null, gearOpenTimer=null;
  $("#gearBtn").addEventListener("click",e=>{
    e.stopPropagation();
    gearTaps++;
    // Reinicia la ventana de tiempo con cada toque.
    clearTimeout(gearTimer);
    gearTimer=setTimeout(()=>{ gearTaps=0; }, 2000);

    if(gearTaps>=5){
      // Cinco toques: abre cupido y cancela la apertura de ajustes.
      gearTaps=0;
      clearTimeout(gearTimer);
      clearTimeout(gearOpenTimer);
      openCupid();
      return;
    }
    // Un toque normal abre ajustes, pero con un pequeño margen por si
    // vienen más toques (para el gesto secreto). Imperceptible al usar.
    clearTimeout(gearOpenTimer);
    gearOpenTimer=setTimeout(()=>{
      if(gearTaps>0 && gearTaps<5){
        $("#settingsOverlay").classList.add("active");
        gearTaps=0; clearTimeout(gearTimer);
      }
    }, 350);
  });
  $("#settingsClose").addEventListener("click",()=>$("#settingsOverlay").classList.remove("active"));
  $("#settingsOverlay").addEventListener("click",e=>{ if(e.target.id==="settingsOverlay") $("#settingsOverlay").classList.remove("active"); });
  $("#tglVibra").addEventListener("click",()=>{ state.vibra=!state.vibra; save(); syncToggles(); if(state.vibra) vibrar(60); });
  $("#tglSonido").addEventListener("click",()=>{ state.sonido=!state.sonido; save(); syncToggles(); if(state.sonido){ initAudio(); beep(660,0.12,"triangle",0.08); } });

  // --- Cerrar evento ---
  $("#evClose").addEventListener("click",cerrarEvento);

  // Tocar fuera de una fila la deselecciona (oculta la papelera).
  $("#setup").addEventListener("click",e=>{
    if(e.target.closest(".gear")) return;
    if(!e.target.closest(".player-row")){
      document.querySelectorAll(".player-row.sel").forEach(r=>r.classList.remove("sel"));
    }
  });
}
